<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduBoard - Lavagna Digitale</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EduBoard">
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="./icon-512x512.png">
    <link rel="apple-touch-icon" href="./icon-192x192.png">
    <meta name="description" content="Lavagna digitale interattiva per la scuola — EduTechLab">
</head>
<body>

    <!-- Header -->
    <header id="app-header">
        <div class="header-left">
            <div class="logo">
                <img src="./icon-192x192.png" alt="EduBoard" class="logo-icon">
                <span class="logo-text">EduBoard</span>
            </div>
            <div class="project-badge" id="project-name">Nuova Lavagna</div>
        </div>
        <div class="header-right">
            <button class="hdr-btn" id="btn-new" title="Nuova lavagna">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                <span>Nuova</span>
            </button>
            <button class="hdr-btn" id="btn-export" title="Esporta PNG">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                <span>Esporta</span>
            </button>
            <button class="hdr-btn hdr-btn--primary" id="btn-save" title="Salva">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                <span>Salva</span>
            </button>
        </div>
    </header>

    <!-- Area principale -->
    <main id="canvas-area">
        <!-- Layer 1: Sfondo -->
        <canvas id="bg-canvas"></canvas>
        <!-- Layer 2: Disegno -->
        <canvas id="draw-canvas"></canvas>
        <!-- Layer 3: Laser / Preview forme -->
        <canvas id="overlay-canvas"></canvas>
        <!-- Layer 4: Input testo inline -->
        <div id="text-cursor" contenteditable="true" spellcheck="false" style="display:none"></div>
    </main>

    <!-- ===== TOOLBAR WRAPPER ===== -->
    <div id="toolbar-wrapper">

        <!-- Linguetta toggle — sempre visibile -->
        <button id="toolbar-toggle" title="Mostra/Nascondi strumenti">
            <svg id="toggle-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="18 15 12 9 6 15"/>
            </svg>
        </button>

        <!-- Toolbar principale -->
        <div id="floating-toolbar">

            <!-- Riga opzioni contestuali (colore + dimensione) -->
            <div id="tool-options-row" class="toolbar-row options-row" style="display:none">
                <div class="options-colors" id="options-colors">
                    <button class="color-swatch active" data-color="#000000" style="background:#000000" title="Nero"></button>
                    <button class="color-swatch" data-color="#1d4ed8" style="background:#1d4ed8" title="Blu"></button>
                    <button class="color-swatch" data-color="#dc2626" style="background:#dc2626" title="Rosso"></button>
                    <button class="color-swatch" data-color="#16a34a" style="background:#16a34a" title="Verde"></button>
                    <button class="color-swatch" data-color="#d97706" style="background:#d97706" title="Arancio"></button>
                    <button class="color-swatch" data-color="#7c3aed" style="background:#7c3aed" title="Viola"></button>
                    <button class="color-swatch" data-color="#be185d" style="background:#be185d" title="Rosa"></button>
                    <button class="color-swatch" data-color="#0891b2" style="background:#0891b2" title="Azzurro"></button>
                    <button class="color-swatch" data-color="#854d0e" style="background:#854d0e" title="Marrone"></button>
                    <button class="color-swatch" data-color="#ffffff" style="background:#ffffff;border:2px solid #64748b" title="Bianco"></button>
                    <button class="color-swatch color-custom" id="color-custom" title="Colore personalizzato">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
                    </button>
                </div>
                <div class="options-divider"></div>
                <div class="options-sizes" id="options-sizes">
                    <button class="size-btn active" data-size="3"><span class="size-dot" style="width:4px;height:4px"></span></button>
                    <button class="size-btn" data-size="6"><span class="size-dot" style="width:7px;height:7px"></span></button>
                    <button class="size-btn" data-size="10"><span class="size-dot" style="width:11px;height:11px"></span></button>
                    <button class="size-btn" data-size="16"><span class="size-dot" style="width:16px;height:16px"></span></button>
                    <button class="size-btn" data-size="24"><span class="size-dot" style="width:22px;height:22px"></span></button>
                </div>
            </div>

            <!-- Riga strumenti principali -->
            <div class="toolbar-row main-row">

                <!-- Gruppo 1: Penne -->
                <div class="tool-group">
                    <button class="tool-btn active" data-tool="pen" title="Penna">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                        <span>Penna</span>
                    </button>
                    <button class="tool-btn" data-tool="pencil" title="Matita HB">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
                        <span>Matita</span>
                    </button>
                    <button class="tool-btn" data-tool="pastel" title="Pastello morbido">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9.06 11.9l8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08"/><path d="M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1.08 1.1 2.49 2.02 4 2.02 2.2 0 4-1.8 4-4.04a3.01 3.01 0 0 0-3-3.02z"/></svg>
                        <span>Pastello</span>
                    </button>
                    <button class="tool-btn" data-tool="marker" title="Evidenziatore">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="8" width="18" height="8" rx="3"/><path d="M21 12H3"/></svg>
                        <span>Evidenz.</span>
                    </button>
                    <button class="tool-btn" data-tool="eraser" title="Gomma">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 20H7L3 16l10-10 7 7-3.5 3.5"/><path d="M6.0001 20L18 8"/></svg>
                        <span>Gomma</span>
                    </button>
                </div>

                <div class="tool-separator"></div>

                <!-- Gruppo 2: Speciali -->
                <div class="tool-group">
                    <button class="tool-btn" data-tool="laser" title="Puntatore laser">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3" fill="currentColor"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
                        <span>Laser</span>
                    </button>
                    <button class="tool-btn" data-tool="text" title="Testo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
                        <span>Testo</span>
                    </button>
                    <button class="tool-btn" data-tool="shape" title="Forme" id="shape-tool-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><circle cx="17.5" cy="6.5" r="3.5"/><polygon points="12 14 20 22 4 22"/></svg>
                        <span>Forme</span>
                    </button>
                </div>

                <div class="tool-separator"></div>

                <!-- Gruppo 3: Sfondo + Azioni -->
                <div class="tool-group">
                    <button class="tool-btn" data-tool="background" title="Sfondo" id="bg-tool-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
                        <span>Sfondo</span>
                    </button>
                    <button class="tool-btn" data-tool="upload-bg" title="Carica immagine sfondo" id="upload-bg-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                        <span>Foto sfondo</span>
                    </button>
                </div>

                <div class="tool-separator"></div>

                <!-- Gruppo 4: Undo/Redo/Cancella -->
                <div class="tool-group">
                    <button class="tool-btn action-btn" id="btn-undo" title="Annulla (Ctrl+Z)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7v6h6"/><path d="M3 13A9 9 0 1 0 5.17 7"/></svg>
                        <span>Annulla</span>
                    </button>
                    <button class="tool-btn action-btn" id="btn-redo" title="Ripeti (Ctrl+Y)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 7v6h-6"/><path d="M21 13A9 9 0 1 1 18.83 7"/></svg>
                        <span>Ripeti</span>
                    </button>
                    <button class="tool-btn action-btn danger-btn" id="btn-clear" title="Cancella tutto">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                        <span>Cancella</span>
                    </button>
                </div>

            </div><!-- end main-row -->

        </div><!-- end floating-toolbar -->
    </div><!-- end toolbar-wrapper -->

    <!-- Popup: Selezione forme -->
    <div id="shape-popup" class="popup-panel" style="display:none">
        <div class="popup-title">Forme</div>
        <div class="shape-grid">
            <button class="shape-opt active" data-shape="line" title="Linea retta">
                <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="6" y1="34" x2="34" y2="6"/></svg>
                <span>Linea</span>
            </button>
            <button class="shape-opt" data-shape="rect" title="Rettangolo">
                <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="5" y="10" width="30" height="20" rx="2"/></svg>
                <span>Rettangolo</span>
            </button>
            <button class="shape-opt" data-shape="circle" title="Cerchio/Ellisse">
                <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2.5"><ellipse cx="20" cy="20" rx="15" ry="12"/></svg>
                <span>Ellisse</span>
            </button>
            <button class="shape-opt" data-shape="triangle" title="Triangolo">
                <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="20,5 35,35 5,35"/></svg>
                <span>Triangolo</span>
            </button>
            <button class="shape-opt" data-shape="arrow" title="Freccia">
                <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="6" y1="20" x2="34" y2="20"/><polyline points="24,12 34,20 24,28"/></svg>
                <span>Freccia</span>
            </button>
            <button class="shape-opt" data-shape="star" title="Stella">
                <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="20,4 24.9,14.8 37,16.2 28,25 30.2,37 20,31.3 9.8,37 12,25 3,16.2 15.1,14.8"/></svg>
                <span>Stella</span>
            </button>
        </div>
        <div class="shape-fill-row">
            <label class="toggle-label">
                <input type="checkbox" id="shape-fill-check">
                <span class="toggle-slider"></span>
                Riempimento
            </label>
        </div>
    </div>

    <!-- Popup: Selezione sfondo -->
    <div id="bg-popup" class="popup-panel" style="display:none">
        <div class="popup-title">Sfondo</div>
        <div class="bg-grid">
            <button class="bg-opt active" data-bg="white" title="Bianco"><div class="bg-preview" style="background:#fff"></div><span>Bianco</span></button>
            <button class="bg-opt" data-bg="lines-8" title="Righe larghe (8mm)"><div class="bg-preview bg-p-lines-8"></div><span>Righe 8mm</span></button>
            <button class="bg-opt" data-bg="lines-5" title="Righe medie (5mm)"><div class="bg-preview bg-p-lines-5"></div><span>Righe 5mm</span></button>
            <button class="bg-opt" data-bg="lines-3" title="Righe strette (3mm)"><div class="bg-preview bg-p-lines-3"></div><span>Righe 3mm</span></button>
            <button class="bg-opt" data-bg="grid-10" title="Quadretti 10mm"><div class="bg-preview bg-p-grid-10"></div><span>Quadr. 10mm</span></button>
            <button class="bg-opt" data-bg="grid-5" title="Quadretti 5mm"><div class="bg-preview bg-p-grid-5"></div><span>Quadr. 5mm</span></button>
            <button class="bg-opt" data-bg="dots" title="Puntini"><div class="bg-preview bg-p-dots"></div><span>Puntini</span></button>
            <button class="bg-opt" data-bg="staff" title="Pentagramma"><div class="bg-preview bg-p-staff"></div><span>Penta­gramma</span></button>
        </div>
    </div>

    <!-- Input file nascosti -->
    <input type="file" id="file-bg-input" accept="image/*" style="display:none">
    <input type="color" id="color-picker-input" style="display:none">

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- Banner aggiornamento SW -->
    <div id="update-banner" class="update-banner" style="display:none">
        <span>Nuova versione disponibile!</span>
        <button id="update-btn">Aggiorna ora</button>
        <button id="dismiss-update" class="close-x">×</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
